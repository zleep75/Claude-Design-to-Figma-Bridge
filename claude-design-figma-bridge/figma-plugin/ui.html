<!DOCTYPE html>
<html>
<head>
<style>
  body { font: 12px -apple-system, sans-serif; margin: 0; padding: 12px; color: #333; }
  textarea { width: 100%; height: 150px; box-sizing: border-box; font: 11px/1.4 monospace;
    border: 1px solid #ddd; border-radius: 6px; padding: 8px; resize: none; }
  button { margin-top: 8px; width: 100%; padding: 8px; border: none; border-radius: 6px;
    background: #18a0fb; color: #fff; font-weight: 600; cursor: pointer; }
  button:disabled { background: #b3b3b3; }
  #log { margin-top: 8px; max-height: 60px; overflow: auto; color: #888; }
  .warn { color: #c47f00; }
</style>
</head>
<body>
  <div>Paste a Design Interaction Spec (DIS) JSON:</div>
  <textarea id="dis" placeholder='{ "version": "0.1", "tokens": {...}, "screens": [...], "flow": {...} }'></textarea>
  <button id="go">Build prototype</button>
  <div id="log"></div>
<script>
  const log = document.getElementById('log');
  document.getElementById('go').onclick = () => {
    const dis = document.getElementById('dis').value.trim();
    if (!dis) return;
    log.textContent = 'Building…';
    parent.postMessage({ pluginMessage: { type: 'build', dis } }, '*');
  };
  onmessage = (e) => {
    const m = e.data.pluginMessage;
    if (!m) return;
    if (m.type === 'error') { log.innerHTML = '<span class="warn">' + m.message + '</span>'; }
    if (m.type === 'done') {
      log.innerHTML = 'Done.' + (m.warnings || []).map(w => '<div class="warn">⚠ ' + w + '</div>').join('');
    }
  };
</script>
</body>
</html>
